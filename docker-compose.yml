services:
  openmemory:
    build:
      context: ./packages/openmemory-js
      dockerfile: Dockerfile
    ports:
      - '127.0.0.1:8180:8180'
    environment:
      # Core Configuration
      - OM_PORT=${OM_PORT:-8180}
      - OM_MODE=${OM_MODE:-standard}
      - OM_TIER=${OM_TIER:-hybrid}
      - OM_DB_PATH=${OM_DB_PATH:-/data/openmemory.sqlite}
      - OM_API_KEY=${OM_API_KEY:-}
      - OM_IDE_MODE=${OM_IDE_MODE:-false}
      - OM_IDE_ALLOWED_ORIGINS=${OM_IDE_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}

      # Rate Limiting
      - OM_RATE_LIMIT_ENABLED=${OM_RATE_LIMIT_ENABLED:-false}
      - OM_RATE_LIMIT_WINDOW_MS=${OM_RATE_LIMIT_WINDOW_MS:-60000}
      - OM_RATE_LIMIT_MAX_REQUESTS=${OM_RATE_LIMIT_MAX_REQUESTS:-100}

      # Compression
      - OM_COMPRESSION_ENABLED=${OM_COMPRESSION_ENABLED:-false}
      - OM_COMPRESSION_ALGORITHM=${OM_COMPRESSION_ALGORITHM:-auto}
      - OM_COMPRESSION_MIN_LENGTH=${OM_COMPRESSION_MIN_LENGTH:-100}

      # Embeddings Configuration
      - OM_EMBEDDINGS=${OM_EMBEDDINGS:-synthetic}
      - OM_EMBEDDING_FALLBACK=${OM_EMBEDDING_FALLBACK:-synthetic}
      - OM_EMBED_MODE=${OM_EMBED_MODE:-simple}
      - OM_ADV_EMBED_PARALLEL=${OM_ADV_EMBED_PARALLEL:-false}
      - OM_EMBED_DELAY_MS=${OM_EMBED_DELAY_MS:-200}
      - OM_VEC_DIM=${OM_VEC_DIM:-256}

      # OpenAI Provider
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OM_OPENAI_API_KEY=${OM_OPENAI_API_KEY:-}
      - OM_OPENAI_BASE_URL=${OM_OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OM_OPENAI_MODEL=${OM_OPENAI_MODEL:-}

      # Gemini Provider
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OM_GEMINI_API_KEY=${OM_GEMINI_API_KEY:-}

      # AWS Provider
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_REGION=${AWS_REGION:-}

      # Ollama Provider
      - OLLAMA_URL=${OLLAMA_URL:-http://localhost:11434}
      - OM_OLLAMA_URL=${OM_OLLAMA_URL:-http://localhost:11434}
      - OM_OLLAMA_MODEL=${OM_OLLAMA_MODEL:-}

      # Local Model
      - LOCAL_MODEL_PATH=${LOCAL_MODEL_PATH:-}
      - OM_LOCAL_MODEL_PATH=${OM_LOCAL_MODEL_PATH:-}

      # Memory & Search
      - OM_MIN_SCORE=${OM_MIN_SCORE:-0.3}
      - OM_MAX_PAYLOAD_SIZE=${OM_MAX_PAYLOAD_SIZE:-1000000}

      # LangGraph Configuration
      - OM_LG_NAMESPACE=${OM_LG_NAMESPACE:-default}
      - OM_LG_MAX_CONTEXT=${OM_LG_MAX_CONTEXT:-50}
      - OM_LG_REFLECTIVE=${OM_LG_REFLECTIVE:-true}

      # Metadata Backend (SQLite/PostgreSQL)
      - OM_METADATA_BACKEND=${OM_METADATA_BACKEND:-sqlite}
      - OM_PG_HOST=${OM_PG_HOST:-}
      - OM_PG_PORT=${OM_PG_PORT:-5432}
      - OM_PG_DB=${OM_PG_DB:-}
      - OM_PG_USER=${OM_PG_USER:-}
      - OM_PG_PASSWORD=${OM_PG_PASSWORD:-}
      - OM_PG_SCHEMA=${OM_PG_SCHEMA:-public}
      - OM_PG_TABLE=${OM_PG_TABLE:-openmemory_memories}
      - OM_PG_SSL=${OM_PG_SSL:-disable}

      # Vector Backend (follows OM_METADATA_BACKEND unless set to 'valkey')
      - OM_VECTOR_BACKEND=${OM_VECTOR_BACKEND:-sqlite}
      - OM_VECTOR_TABLE=${OM_VECTOR_TABLE:-openmemory_vectors}
      - OM_WEAVIATE_URL=${OM_WEAVIATE_URL:-}
      - OM_WEAVIATE_API_KEY=${OM_WEAVIATE_API_KEY:-}
      - OM_WEAVIATE_CLASS=${OM_WEAVIATE_CLASS:-OpenMemory}

      # Auto Reflection
      - OM_AUTO_REFLECT=${OM_AUTO_REFLECT:-false}
      - OM_REFLECT_INTERVAL=${OM_REFLECT_INTERVAL:-10}
      - OM_REFLECT_MIN_MEMORIES=${OM_REFLECT_MIN_MEMORIES:-20}

      # User Summaries
      - OM_USER_SUMMARY_INTERVAL=${OM_USER_SUMMARY_INTERVAL:-30}
      - OM_USE_SUMMARY_ONLY=${OM_USE_SUMMARY_ONLY:-true}
      - OM_SUMMARY_MAX_LENGTH=${OM_SUMMARY_MAX_LENGTH:-200}

      # HSG Configuration
      - OM_SEG_SIZE=${OM_SEG_SIZE:-10000}
      - OM_CACHE_SEGMENTS=${OM_CACHE_SEGMENTS:-3}
      - OM_MAX_ACTIVE=${OM_MAX_ACTIVE:-64}

      # Decay System
      - OM_DECAY_LAMBDA=${OM_DECAY_LAMBDA:-0.02}
      - OM_DECAY_INTERVAL_MINUTES=${OM_DECAY_INTERVAL_MINUTES:-1440}
      - OM_DECAY_RATIO=${OM_DECAY_RATIO:-0.03}
      - OM_DECAY_SLEEP_MS=${OM_DECAY_SLEEP_MS:-200}
      - OM_DECAY_THREADS=${OM_DECAY_THREADS:-3}
      - OM_DECAY_COLD_THRESHOLD=${OM_DECAY_COLD_THRESHOLD:-0.25}
      - OM_DECAY_REINFORCE_ON_QUERY=${OM_DECAY_REINFORCE_ON_QUERY:-true}

      # Compression & Regeneration
      - OM_REGENERATION_ENABLED=${OM_REGENERATION_ENABLED:-true}
      - OM_MAX_VECTOR_DIM=${OM_MAX_VECTOR_DIM:-256}
      - OM_MIN_VECTOR_DIM=${OM_MIN_VECTOR_DIM:-64}
      - OM_SUMMARY_LAYERS=${OM_SUMMARY_LAYERS:-3}

      # Keyword Extraction
      - OM_KEYWORD_BOOST=${OM_KEYWORD_BOOST:-2.5}
      - OM_KEYWORD_MIN_LENGTH=${OM_KEYWORD_MIN_LENGTH:-3}

      # Optional FalkorDB GraphRAG bridge
      - OM_GRAPHRAG_ENABLED=${OM_GRAPHRAG_ENABLED:-false}
      - OM_GRAPHRAG_URL=${OM_GRAPHRAG_URL:-http://graphrag-bridge:8765}
      - OM_GRAPHRAG_TIMEOUT_MS=${OM_GRAPHRAG_TIMEOUT_MS:-120000}
      - OM_GRAPHRAG_BRIDGE_API_KEY=${OM_GRAPHRAG_BRIDGE_API_KEY:-}
      - OM_GRAPHRAG_WRITE_ENABLED=${OM_GRAPHRAG_WRITE_ENABLED:-false}
      - OM_GRAPHRAG_ALLOW_UNAUTH_WRITE=${OM_GRAPHRAG_ALLOW_UNAUTH_WRITE:-false}
      - OM_GRAPHRAG_ALLOW_GLOBAL_QUERY=${OM_GRAPHRAG_ALLOW_GLOBAL_QUERY:-false}
      - OM_GRAPHRAG_ALLOW_UNFILTERED_SCOPED_QUERY=${OM_GRAPHRAG_ALLOW_UNFILTERED_SCOPED_QUERY:-false}
      - OM_GRAPHRAG_SYNC_ON_ADD=${OM_GRAPHRAG_SYNC_ON_ADD:-false}
      - OM_GRAPHRAG_CONTEXT_ENABLED=${OM_GRAPHRAG_CONTEXT_ENABLED:-false}
    volumes:
      - openmemory_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'require("http").get("http://localhost:8180/health",(res)=>process.exit(res.statusCode===200?0:1)).on("error",()=>process.exit(1))',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Dashboard: Web UI for visualizing and managing memories
  dashboard:
    profiles:
      - ui
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8180}
        - NEXT_PUBLIC_API_KEY=${NEXT_PUBLIC_API_KEY:-}
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8180}
      - NEXT_PUBLIC_API_KEY=${NEXT_PUBLIC_API_KEY:-}
    depends_on:
      openmemory:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Optional: Valkey for high-performance vector storage
  # Uncomment to use Valkey instead of SQLite/PostgreSQL for vectors
  # Don't forget to set OM_VECTOR_BACKEND=valkey in your .env
  # valkey:
  #   image: valkey/valkey:8.0
  #   ports:
  #     - '6379:6379'
  #   volumes:
  #     - valkey_data:/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ['CMD', 'valkey-cli', 'ping']
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 30s

  # Optional: FalkorDB + GraphRAG-SDK bridge for relationship-heavy retrieval.
  # Start with: docker compose --profile graphrag up -d falkordb graphrag-bridge openmemory
  falkordb:
    profiles:
      - graphrag
    image: falkordb/falkordb:latest
    ports:
      - '127.0.0.1:${FALKORDB_HOST_PORT:-6379}:6379'
      - '127.0.0.1:${FALKORDB_DASHBOARD_PORT:-3001}:3000'
    volumes:
      - falkordb_data:/data
    restart: unless-stopped

  graphrag-bridge:
    profiles:
      - graphrag
    build:
      context: ./tools/openmemory-graphrag-bridge
      dockerfile: Dockerfile
    ports:
      - '127.0.0.1:${GRAPHRAG_BRIDGE_HOST_PORT:-8765}:8765'
    environment:
      - FALKORDB_HOST=falkordb
      - FALKORDB_PORT=6379
      - OM_GRAPHRAG_BRIDGE_API_KEY=${OM_GRAPHRAG_BRIDGE_API_KEY:-}
      - OM_GRAPHRAG_GRAPH_NAME=${OM_GRAPHRAG_GRAPH_NAME:-openmemory}
      - OM_GRAPHRAG_LLM_MODEL=${OM_GRAPHRAG_LLM_MODEL:-}
      - OM_GRAPHRAG_LLM_MAX_TOKENS=${OM_GRAPHRAG_LLM_MAX_TOKENS:-}
      - OM_GRAPHRAG_EMBEDDER_MODEL=${OM_GRAPHRAG_EMBEDDER_MODEL:-}
      - OM_GRAPHRAG_EMBEDDER_DIMENSIONS=${OM_GRAPHRAG_EMBEDDER_DIMENSIONS:-256}
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://host.docker.internal:11434}
      - OM_GRAPHRAG_API_BASE=${OM_GRAPHRAG_API_BASE:-}
      - HF_HOME=${HF_HOME:-/root/.cache/huggingface}
      - TRANSFORMERS_CACHE=${TRANSFORMERS_CACHE:-/root/.cache/huggingface/transformers}
      - OM_GRAPHRAG_GLINER_MODEL=${OM_GRAPHRAG_GLINER_MODEL:-urchade/gliner_medium-v2.1}
      - OM_GRAPHRAG_GLINER_CACHE_DIR=${OM_GRAPHRAG_GLINER_CACHE_DIR:-/root/.cache/huggingface}
      - OM_GRAPHRAG_GLINER_PREWARM=${OM_GRAPHRAG_GLINER_PREWARM:-true}
      - OM_GRAPHRAG_GLINER_ALLOW_ONLINE_FALLBACK=${OM_GRAPHRAG_GLINER_ALLOW_ONLINE_FALLBACK:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - graphrag_bridge_hf_cache:/root/.cache/huggingface
    depends_on:
      - falkordb
    restart: unless-stopped

volumes:
  openmemory_data:
    driver: local
  falkordb_data:
    driver: local
  graphrag_bridge_hf_cache:
    driver: local
  # Uncomment if using Valkey
  # valkey_data:
  #   driver: local
