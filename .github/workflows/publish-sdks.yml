name: Publish JavaScript package
permissions:
  contents: read
  id-token: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: cd packages/openmemory-js && npm ci --workspaces=false

      - name: Build
        run: cd packages/openmemory-js && npm run build

      - name: Pack dry run
        run: cd packages/openmemory-js && npm pack --dry-run

      - name: Publish
        run: cd packages/openmemory-js && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
