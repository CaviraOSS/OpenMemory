name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test-js:
    name: Test JavaScript package
    runs-on: ubuntu-latest
    env:
      OM_TIER: fast
      OM_VEC_DIM: "1536"
      OM_EMBEDDINGS: synthetic
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd packages/openmemory-js && npm ci

      - name: Build
        run: cd packages/openmemory-js && npm run build

      - name: Import smoke test
        run: cd packages/openmemory-js && npx tsx tests/import_smoke.ts

      - name: Run omnibus test
        run: cd packages/openmemory-js && npx tsx tests/omnibus.ts
